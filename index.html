<!DOCTYPE html>
<html lang="uk">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TraceCam</title>
    <link rel="stylesheet" href="style.css" />
</head>

<body>
    <main class="app">
        <video id="camera" autoplay playsinline></video>

        <img id="overlayImage" class="overlay-image" alt="Фото для обводки" />

        <canvas id="canvas" hidden></canvas>

        <section class="controls">
            <h1>TraceCam</h1>

            <input type="file" id="imageInput" accept="image/*" />

            <button id="sketchButton">Зробити контур</button>
            <button id="originalButton">Повернути оригінал</button>

            <label>
                Прозорість
                <input type="range" id="opacityControl" min="0.1" max="1" step="0.05" value="0.55" />
            </label>

            <label>
                Розмір
                <input type="range" id="scaleControl" min="0.2" max="3" step="0.05" value="1" />
            </label>

            <label>
                Поворот
                <input type="range" id="rotateControl" min="-180" max="180" step="1" value="0" />
            </label>

            <label>
                Сила контуру
                <input type="range" id="edgeControl" min="20" max="120" step="5" value="60" />
            </label>

            <button id="lockButton">Зафіксувати фото</button>
        </section>
    </main>

    <script src="script.js"></script>
</body>

</html>
